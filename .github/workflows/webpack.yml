name: NodeJS with Webpack

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm install
        npm install -D typescript ts-loader webpack webpack-cli

    - name: Create src directory and TypeScript file if not exists
      run: |
        mkdir -p src
        if [ ! -f src/index.ts ]; then
          echo '// TypeScript entry point' > src/index.ts
          echo 'console.log("Hello from TypeScript!");' >> src/index.ts
        fi

    - name: Build
      run: npx webpack --entry ./src/main.tsx --mode production

    - name: Upload build artifacts (optional)
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ matrix.node-version }}
        path: dist/
